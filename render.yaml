services:
  - type: web
    name: tecport-lead-intelligence-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: APP_NAME
        value: Tecport Lead Intelligence
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      - key: MAX_RESULTS_PER_SEARCH
        value: "20"
      - key: MAX_PAGES_PER_SEARCH
        value: "50"
      - key: MAX_CONCURRENT_REQUESTS
        value: "3"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "30"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: EXPORT_DIRECTORY
        value: ./exports
